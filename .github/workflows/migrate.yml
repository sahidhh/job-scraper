name: Database migrations

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Extract project ref from Supabase URL
        run: echo "PROJECT_REF=$(echo '${{ secrets.SUPABASE_URL }}' | sed 's|https://||; s|\.supabase\.co.*||')" >> $GITHUB_ENV

      - name: Link project
        run: supabase link --project-ref $PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # A failed migrate is silent by default: the push to main that triggered
      # it has already merged green, so nothing surfaces the fact that the
      # schema is now behind the code. That is not hypothetical -- SUPABASE_
      # ACCESS_TOKEN expired on 2026-07-19 and every run failed at `link` for
      # two days while PRs kept merging, until a backfill hit a column its
      # migration had never created.
      #
      # Uses the same Telegram bot the digest already goes through; the alert
      # is best-effort (`|| true`) so a notification outage can never be the
      # thing that fails the workflow.
      - name: Alert on failure
        if: failure()
        run: |
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=<b>Migration failed</b>%0AThe schema is now behind main. Migrations do NOT apply until this is fixed.%0A%0ACommit: <code>${GITHUB_SHA:0:7}</code>%0A<a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">View run</a>" \
            || true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

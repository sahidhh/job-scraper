name: Validate sources

# Runs weekly (Sunday 06:00 UTC) and on manual dispatch.
# Weekly cadence surfaces newly broken boards within one week of failure.
# Increase frequency if source churn rate rises.
# See docs/operations/source-validation.md and docs/reports/source-validation-2026-06-22.md.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 0"

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run validate-sources
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

name: Scrape pipeline

# AD-04: scrape -> score -> notify, run with the Supabase service-role key
# (AD-12 -- bypasses RLS for cron scripts only).
#
# Phase 4 go-live (docs/agent-workflow.md) has happened -- the recurring
# schedule below is live, running every 6 hours, alongside manual dispatch.
# See PROJECT_STATE.md §3 for the go-live note; a couple of older docs
# (design/limitations.md §1.3, docs/deployment.md §11) still describe an
# earlier not-yet-live state and are tracked as known drift in
# TECHNICAL_DEBT.md pending confirmation of whether 6h (vs. the originally
# planned 2h) was a deliberate choice.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"

# A manual dispatch overlapping a scheduled run (or two scheduled runs if a
# prior one overruns its 6h slot) could each independently pass the
# fingerprint dedup check-then-write for the same logical job before either
# has committed, producing two rows with the same fingerprint. Queue instead
# of running concurrently; never cancel a run partway through scrape/score/
# notify since that could leave the pipeline mid-step.
concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Phase 1A source cleanup (docs/reports/source-validation-2026-06-22.md):
          # RemoteOK yields 0 kept jobs -- location strings ("Worldwide","USA") never
          # match India/SG/UAE/Remote tags. Disable explicitly.
          REMOTEOK_DISABLED: 'true'
          # Wellfound feed URL is not configured. Adapter already auto-disables when
          # WELLFOUND_FEED_URL is unset, but explicit flag suppresses any log noise.
          WELLFOUND_DISABLED: 'true'
          # AD-10/docs/scrapers.md §5 -- optional; if unset, Wellfound
          # adapter degrades to zero jobs per run (not a failure).
          WELLFOUND_FEED_URL: ${{ secrets.WELLFOUND_FEED_URL }}
          # Aggregator APIs (AD-35). Each adapter auto-disables cleanly when its
          # key is unset, so passing an empty secret through here is harmless --
          # the source simply skips until the secret exists. JSearch is the only
          # UAE-reachable aggregator; Adzuna covers in/sg only (no UAE).
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          JSEARCH_COUNTRIES: ${{ vars.JSEARCH_COUNTRIES || 'in,sg,ae' }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ADZUNA_COUNTRIES: ${{ vars.ADZUNA_COUNTRIES || 'in,sg' }}
          # Remotive/Himalayas (AD-47) need no secrets and are enabled by default.

      - run: npm run score
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          KEYWORD_THRESHOLD: ${{ vars.KEYWORD_THRESHOLD || '0.25' }}

      - run: npm run notify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_THRESHOLD: ${{ vars.NOTIFY_THRESHOLD || '0.75' }}
          NOTIFY_MODE: ${{ vars.NOTIFY_MODE || 'digest' }}
          APP_URL: ${{ secrets.APP_URL || vars.APP_URL }}
          TELEGRAM_CALLBACK_SECRET: ${{ secrets.TELEGRAM_CALLBACK_SECRET }}

name: Scrape pipeline

# AD-04: scrape -> score -> notify, run with the Supabase service-role key
# (AD-12 -- bypasses RLS for cron scripts only).
#
# The recurring schedule is commented out pending the Phase 4 go-live
# decision (docs/agent-workflow.md -- enabling the cron schedule has
# cost/security implications and requires human approval). Until then this
# workflow only runs on manual dispatch.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"

# A manual dispatch overlapping a scheduled run (or two scheduled runs if a
# prior one overruns its 6h slot) could each independently pass the
# fingerprint dedup check-then-write for the same logical job before either
# has committed, producing two rows with the same fingerprint. Queue instead
# of running concurrently; never cancel a run partway through scrape/score/
# notify since that could leave the pipeline mid-step.
concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Phase 1A source cleanup (docs/reports/source-validation-2026-06-22.md):
          # RemoteOK yields 0 kept jobs -- location strings ("Worldwide","USA") never
          # match India/SG/UAE/Remote tags. Disable explicitly.
          REMOTEOK_DISABLED: 'true'
          # Wellfound feed URL is not configured. Adapter already auto-disables when
          # WELLFOUND_FEED_URL is unset, but explicit flag suppresses any log noise.
          WELLFOUND_DISABLED: 'true'
          # AD-10/docs/scrapers.md §5 -- optional; if unset, Wellfound
          # adapter degrades to zero jobs per run (not a failure).
          WELLFOUND_FEED_URL: ${{ secrets.WELLFOUND_FEED_URL }}

      - run: npm run score
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          KEYWORD_THRESHOLD: ${{ vars.KEYWORD_THRESHOLD || '0.25' }}

      - run: npm run notify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_THRESHOLD: ${{ vars.NOTIFY_THRESHOLD || '0.75' }}
          NOTIFY_MODE: ${{ vars.NOTIFY_MODE || 'digest' }}
          APP_URL: ${{ secrets.APP_URL || vars.APP_URL }}
          TELEGRAM_CALLBACK_SECRET: ${{ secrets.TELEGRAM_CALLBACK_SECRET }}
